<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUXTUBE PRO - Official Hub</title>
    
    <script id="fluxtube-update-config" type="application/json">
    {
        "appVariant": "PAB",
        "latestVersion": "90.10.06",
        "downloadUrl": "https://www.dropbox.com/scl/fi/mc8cbw1hxn4ojhbs4biok/FLUXTUBE-Trial.zip?rlkey=cs0mvrfyi5s64sikxh7354b7p&st=q0jc8ivi&dl=1",
        "updateSize": "10.5 MB",
        "releaseNotes": [
            "Introduced deep-level bypass protocols for Extension CSPs.",
            "Added futuristic zero-latency update overlay UI.",
            "Optimized memory caching via Stealth DB architecture.",
            "Enhanced dynamic UI resolution scaling."
        ]
    }
    </script>
    <style>
        :root {
            /* --- 3D PARALLAX CONFIGURATION --- */
            --perspective: 1000px;
            --tilt-margin-x: 50px; 
            --tilt-margin-y: 50px; 

            /* --- DEPTH LAYERS --- */
            --z-bg: -10px;
            --z-content: 35px;
            --z-text: 15px;
            --z-btn: 25px;
            --z-btn-hover: 45px;
            --z-mark: 50px;

            /* --- COLORS --- */
            --bg-dark: #07070a;
            --accent: #9b59b6;
            --cyan: #00d2d3;
            --text-main: #ffffff;
            --text-muted: #888888;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: transparent;
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* --- ANTI-BLUR TYPOGRAPHY FIXES --- */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            perspective: var(--perspective);
        }

        /* --- DRAG HANDLE --- */
        .drag-zone {
            position: absolute; top: 0; left: 0; width: 100%; height: 35px;
            -webkit-app-region: drag; z-index: 9999;
            transform: translateZ(100px);
        }

        #container {
            width: calc(100% - var(--tilt-margin-x)); 
            height: calc(100% - var(--tilt-margin-y)); 
            background: var(--bg-dark);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 120px rgba(155, 89, 182, 0.05);
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
            transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            /* Removed will-change: transform; to prevent bitmap rasterization blurring */
        }

        /* Fast Smooth Embers Background for PAB (Futuristic Purple Edition) */
        .bg-animation {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            margin: 0; padding: 0;
            z-index: 0;
            pointer-events: none;
            border-radius: inherit;
        }
        .bg-animation li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px; height: 20px;
            background: rgba(155, 89, 182, 0.2);
            border: 1px solid rgba(0, 210, 211, 0.3);
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.4);
            animation: riseUp 4s linear infinite;
            bottom: -50px;
            backface-visibility: hidden;
        }
        .bg-animation li:nth-child(1) { left: 10%; width: 40px; height: 40px; animation-duration: 3s; }
        .bg-animation li:nth-child(2) { left: 30%; width: 15px; height: 15px; animation-duration: 2.5s; animation-delay: 1s; }
        .bg-animation li:nth-child(3) { left: 50%; width: 25px; height: 25px; animation-duration: 4s; animation-delay: 2s; }
        .bg-animation li:nth-child(4) { left: 70%; width: 35px; height: 35px; animation-duration: 3.5s; }
        .bg-animation li:nth-child(5) { left: 85%; width: 10px; height: 10px; animation-duration: 2s; animation-delay: 0.5s; }
        .bg-animation li:nth-child(6) { left: 20%; width: 20px; height: 20px; animation-duration: 3.2s; animation-delay: 1.5s; }

        @keyframes riseUp {
            0% { transform: translateY(0) rotate(0deg) translateZ(var(--z-bg)); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-800px) rotate(360deg) translateZ(var(--z-bg)); opacity: 0; border-radius: 50%; }
        }

        .glow-bg {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(155, 89, 182, 0.12) 0%, rgba(0,210,211,0.05) 40%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(var(--z-bg));
            z-index: 0;
            pointer-events: none;
            animation: cyberSpin 10s linear infinite;
        }

        @keyframes cyberSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(1) translateZ(var(--z-bg)); }
            50% { transform: translate(-50%, -50%) rotate(180deg) scale(1.05) translateZ(var(--z-bg)); }
            100% { transform: translate(-50%, -50%) rotate(360deg) scale(1) translateZ(var(--z-bg)); }
        }

        /* --- UNBOUND, ALWAYS-VISIBLE CANVAS LAYER --- */
        #nexus-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; border-radius: inherit; opacity: 0.7;
            transform: translateZ(var(--z-bg));
        }

        .content {
            z-index: 2;
            text-align: center;
            width: 100%;
            max-width: 380px;
            padding: 25px 20px;
            background: rgba(7, 7, 10, 0.6);
            border: 1px solid rgba(0, 210, 211, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(12px);
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateZ(var(--z-content));
            transform-style: preserve-3d;
            backface-visibility: hidden; /* Fixes 3D blur */
        }

        h1 {
            font-size: 26px;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            background: linear-gradient(90deg, var(--accent), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            transform: translateZ(var(--z-text));
            backface-visibility: hidden;
        }
        
        .variant-subtitle {
            font-size: 14px;
            color: var(--cyan);
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 210, 211, 0.4);
            transform: translateZ(var(--z-text));
            backface-visibility: hidden;
        }

        .version-badge {
            display: inline-block;
            background: rgba(0, 210, 211, 0.1);
            color: var(--cyan);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 210, 211, 0.3);
            box-shadow: 0 0 10px rgba(0, 210, 211, 0.15);
            transform: translateZ(var(--z-text));
            backface-visibility: hidden;
        }

        p {
            transform: translateZ(var(--z-text));
            pointer-events: none;
            backface-visibility: hidden;
        }

        .btn-download {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(45deg, var(--accent), #8e44ad);
            color: #fff;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.3);
            -webkit-app-region: no-drag;
            position: relative;
            overflow: hidden;
            z-index: 1;
            cursor: pointer;
            transform: translateZ(var(--z-btn));
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .btn-download::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 210, 211, 0.4), transparent);
            transition: all 0.4s ease;
            z-index: -1;
        }

        .btn-download:hover::before { left: 100%; }
        .btn-download:hover {
            transform: translateZ(var(--z-btn-hover)) translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 210, 211, 0.4);
        }

        /* Loading State Styles */
        .btn-download.is-loading {
            pointer-events: none;
            opacity: 0.85;
            cursor: wait;
            background: linear-gradient(45deg, #2c3e50, #2c3e50);
            box-shadow: none;
            transform: translateZ(var(--z-btn));
        }

        .spinner-icon {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: var(--cyan);
            animation: spinLoader 0.8s ease-in-out infinite;
            margin-right: 10px;
        }

        .is-loading .spinner-icon {
            display: inline-block;
        }

        @keyframes spinLoader {
            to { transform: rotate(360deg); }
        }

        .notes-container {
            margin-top: 25px;
            text-align: left;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            -webkit-app-region: no-drag;
            height: 110px;
            overflow-y: auto;
            transform: translateZ(10px);
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .notes-container::-webkit-scrollbar { width: 5px; }
        .notes-container::-webkit-scrollbar-thumb { background: rgba(155,89,182,0.4); border-radius: 3px; }

        .notes-container h3 {
            margin: 0 0 10px 0;
            font-size: 13px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(155,89,182,0.3);
            padding-bottom: 8px;
            transform: translateZ(5px);
            backface-visibility: hidden;
        }

        ul { margin: 0; color: #ccc; line-height: 1.6; font-size: 12px; padding-left: 20px; }
        li { margin-bottom: 5px; transform: translateZ(5px); backface-visibility: hidden; }

        /* VIDU Creator Mark */
        .creator-mark {
            position: absolute;
            bottom: 15px;
            right: 35px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--cyan);
            z-index: 10;
            text-transform: uppercase;
            overflow: hidden;
            border-right: 2px solid var(--accent);
            white-space: nowrap;
            animation: typingScan 4s steps(40, end) infinite, blinkCursor 0.5s step-end infinite alternate;
            -webkit-app-region: no-drag;
            pointer-events: none;
            transform: translateZ(var(--z-mark));
            backface-visibility: hidden;
        }
        .creator-mark::before {
            content: 'SYS.DEV: ';
            color: var(--text-muted);
            font-weight: 400;
        }

        @keyframes typingScan {
            0%, 20% { width: 0; filter: hue-rotate(0deg); }
            40%, 80% { width: 140px; filter: hue-rotate(90deg); text-shadow: 0 0 10px var(--accent); }
            100% { width: 0; filter: hue-rotate(0deg); }
        }
        @keyframes blinkCursor {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="drag-zone"></div>
        <ul class="bg-animation">
            <li></li><li></li><li></li><li></li><li></li><li></li>
        </ul>

        <div class="glow-bg"></div>
        
        <canvas id="nexus-canvas"></canvas>

        <div class="content">
            <h1>FLUXTUBE PRO</h1>
            <div class="variant-subtitle" id="display-variant">PAB EDITION</div>
            <div class="version-badge" id="display-version">Version Loading...</div>
            
            <p style="color: var(--text-muted); margin: 0 0 20px 0; font-size: 12px; line-height: 1.5;">
                A critical system update is available. Upgrade your client to experience the latest protocols.
            </p>

            <a href="#" class="btn-download" id="download-btn">
                <span class="spinner-icon"></span>
                <span class="btn-text">DOWNLOAD UPDATE</span>
            </a>

            <div class="notes-container">
                <h3>What's New 💎</h3>
                <ul id="display-notes"></ul>
            </div>
        </div>

        <div class="creator-mark">VIDU</div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const configBlock = document.getElementById('fluxtube-update-config').textContent;
            
            // UI Logic for Download Button
            const downloadBtn = document.getElementById('download-btn');
            const btnText = downloadBtn.querySelector('.btn-text');

            downloadBtn.addEventListener('click', (e) => {
                if (downloadBtn.classList.contains('is-loading')) {
                    e.preventDefault();
                    return;
                }
                downloadBtn.classList.add('is-loading');
                btnText.innerText = "INITIALIZING...";
                console.log("Update sequence initialized.");
            });

            try {
                const data = JSON.parse(configBlock);
                document.getElementById('display-version').innerText = `Version ${data.latestVersion}`;
                document.getElementById('download-btn').href = data.downloadUrl || data.downloadLink || "#";
                
                const notesList = document.getElementById('display-notes');
                data.releaseNotes.forEach(note => {
                    const li = document.createElement('li');
                    li.innerText = note;
                    notesList.appendChild(li);
                });
            } catch(e) {
                console.error("Config Parsing Error", e);
            }
            
            // --- 3D MOUSE PARALLAX & PHYSICS CONFIGURATION ---
            const TILT_SENSITIVITY = 15; 
            const RETURN_SPEED = '0.5s'; 
            const TRACK_SPEED = '0.1s'; 
            const container = document.getElementById('container');

            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / TILT_SENSITIVITY;
                const yAxis = (window.innerHeight / 2 - e.pageY) / TILT_SENSITIVITY;
                
                container.style.setProperty('--ry', `${-xAxis}deg`);
                container.style.setProperty('--rx', `${yAxis}deg`);

                const rect = container.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });

            document.addEventListener('mouseleave', () => {
                container.style.transition = `transform ${RETURN_SPEED} cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
                container.style.setProperty('--ry', `0deg`);
                container.style.setProperty('--rx', `0deg`);
                mouse.x = undefined; mouse.y = undefined;
            });

            document.addEventListener('mouseenter', () => {
                container.style.transition = `transform ${TRACK_SPEED} cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
            });

            // --- NEXUS CANVAS ENGINE (PAB: Purple/Cyan Theme) ---
            const canvas = document.getElementById('nexus-canvas');
            const ctx = canvas.getContext('2d');
            let particlesArray = [];
            const mouse = { x: undefined, y: undefined, radius: 140 };

            function initNexus() {
                particlesArray = [];
                const numberOfParticles = 70; 
                for (let i = 0; i < numberOfParticles; i++) {
                    const size = (Math.random() * 2) + 1.5; 
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    const directionX = (Math.random() * 1) - 0.5; 
                    const directionY = (Math.random() * 1) - 0.5; 
                    const color = Math.random() > 0.5 ? '#9b59b6' : '#00d2d3'; 
                    particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
                }
            }

            class Particle {
                constructor(x, y, directionX, directionY, size, color) {
                    this.x = x; this.y = y; this.directionX = directionX; this.directionY = directionY;
                    this.size = size; this.color = color; this.baseX = this.directionX; this.baseY = this.directionY;
                }
                draw() {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                    ctx.shadowBlur = 8; ctx.shadowColor = this.color; ctx.fillStyle = this.color; ctx.fill(); ctx.shadowBlur = 0; 
                }
                update() {
                    const centerX = canvas.width / 2; const centerY = canvas.height / 2;
                    this.baseX += (centerX - this.x) * 0.00001; this.baseY += (centerY - this.y) * 0.00001;

                    if (this.x + this.size > canvas.width) { this.x = canvas.width - this.size; this.directionX = -Math.abs(this.directionX); this.baseX = -Math.abs(this.baseX); } 
                    else if (this.x - this.size < 0) { this.x = this.size; this.directionX = Math.abs(this.directionX); this.baseX = Math.abs(this.baseX); }
                    if (this.y + this.size > canvas.height) { this.y = canvas.height - this.size; this.directionY = -Math.abs(this.directionY); this.baseY = -Math.abs(this.baseY); } 
                    else if (this.y - this.size < 0) { this.y = this.size; this.directionY = Math.abs(this.directionY); this.baseY = Math.abs(this.baseY); }

                    if (mouse.x !== undefined) {
                        const dx = mouse.x - this.x; const dy = mouse.y - this.y; const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < mouse.radius) {
                            const forceDirectionX = dx / distance; const forceDirectionY = dy / distance; const force = (mouse.radius - distance) / mouse.radius;
                            this.directionX -= forceDirectionX * force * 1.8; this.directionY -= forceDirectionY * force * 1.8;
                        }
                    }

                    this.directionX = this.directionX * 0.95 + this.baseX * 0.05; this.directionY = this.directionY * 0.95 + this.baseY * 0.05;
                    const speed = Math.sqrt(this.directionX * this.directionX + this.directionY * this.directionY);
                    if(speed > 5) { this.directionX = (this.directionX / speed) * 5; this.directionY = (this.directionY / speed) * 5; }
                    this.x += this.directionX; this.y += this.directionY; this.draw();
                }
            }

            function animateNexus() {
                requestAnimationFrame(animateNexus); ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); }
                connectNexus();
            }

            function connectNexus() {
                const maxDist = 18000; 
                for (let a = 0; a < particlesArray.length; a++) {
                    for (let b = a; b < particlesArray.length; b++) {
                        const dx = particlesArray[a].x - particlesArray[b].x; const dy = particlesArray[a].y - particlesArray[b].y; const distance = (dx * dx) + (dy * dy);
                        if (distance < maxDist) {
                            const opacityValue = 1 - (distance / maxDist);
                            ctx.strokeStyle = particlesArray[a].color; ctx.globalAlpha = opacityValue * 0.8; ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                        }
                    }
                    if (mouse.x !== undefined) {
                        const mdx = particlesArray[a].x - mouse.x; const mdy = particlesArray[a].y - mouse.y; const mouseDist = (mdx * mdx) + (mdy * mdy);
                        if(mouseDist < 30000) {
                            const mouseOp = 1 - (mouseDist / 30000);
                            ctx.strokeStyle = '#ffffff'; ctx.globalAlpha = mouseOp; ctx.lineWidth = 2;
                            ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
                        }
                    }
                }
                ctx.globalAlpha = 1.0; 
            }

            function startCanvasEngine() {
                if (container.offsetWidth === 0) { requestAnimationFrame(startCanvasEngine); return; }
                canvas.width = container.offsetWidth; canvas.height = container.offsetHeight;
                initNexus(); animateNexus();
            }
            startCanvasEngine();

            window.addEventListener('resize', () => {
                if(container.offsetWidth > 0) { canvas.width = container.offsetWidth; canvas.height = container.offsetHeight; initNexus(); }
            });
        });
    </script>
</body>
</html>
